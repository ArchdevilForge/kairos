# golangci-lint configuration for Kairos Go daemon.
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

run:
  timeout: 5m
  tests: true

issues:
  # Exclude autogenerated files and very long lines (generated code).
  exclude-files:
    - "zz_generated_"
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
